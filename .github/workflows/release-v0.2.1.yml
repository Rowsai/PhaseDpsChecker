name: Publish Phase DPS Checker v0.2.1

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/release-v0.2.1.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseBase64 = @'
          
          '@
          $releaseZip = Join-Path $env:RUNNER_TEMP 'latest.zip'
          [IO.File]::WriteAllBytes($releaseZip, [Convert]::FromBase64String($releaseBase64))
          gh release create v0.2.1 $releaseZip --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title 'Phase DPS Checker v0.2.1' --notes 'Dalamud API 15向け初回リリース。フェーズ別DPS集計、戦闘履歴、開始・終了時間表示、青テーマ、プラグインアイコンを収録。'
