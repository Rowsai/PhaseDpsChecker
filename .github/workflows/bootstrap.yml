name: Bootstrap Source

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: windows-latest
    steps:
      - name: Checkout bootstrap commit
        uses: actions/checkout@v5
      - name: Publish source
        shell: pwsh
        run: |
          $sourceBase64 = @'
          
          '@
          $sourceZip = Join-Path $env:RUNNER_TEMP 'source.zip'
          $stage = Join-Path $env:RUNNER_TEMP 'source'
          [IO.File]::WriteAllBytes($sourceZip, [Convert]::FromBase64String($sourceBase64))
          Expand-Archive -LiteralPath $sourceZip -DestinationPath $stage -Force
          $stageWorkflowDirectory = Join-Path $stage '.github'
          if (Test-Path -LiteralPath $stageWorkflowDirectory) {
            Remove-Item -LiteralPath $stageWorkflowDirectory -Recurse -Force
          }
          Get-ChildItem -LiteralPath $stage -Force | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $env:GITHUB_WORKSPACE -Recurse -Force
          }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish Phase DPS Checker v0.2.1 source'
          git push origin HEAD:main
